name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test arc-story-queue
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: arc-story-queue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: arc-story-queue/package-lock.json
      - run: npm ci
      - run: npm test
